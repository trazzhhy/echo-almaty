services:
  postgres:
    image: postgres:16-alpine
    container_name: echo-almaty-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: echo_almaty
    ports:
      - "5432:5432"
    volumes:
      - echo_almaty_postgres_data:/var/lib/postgresql/data

volumes:
  echo_almaty_postgres_data:
